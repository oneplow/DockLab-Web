version: '3.8'

services:
  web:
    build: .
    container_name: docklab-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-changeme}
      - ADMIN_PASSKEY=${ADMIN_PASSKEY:-docklab-admin-1234}
      # Make sure to pass your Google OAuth secrets if you still want Google Login
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # Use an actual DB, or sqlite if dev. Since prisma schema specifies MySQL:
      - DATABASE_URL=mysql://root:rootpassword@db:3306/docklab
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8
    container_name: docklab-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=docklab
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 10s
        timeout: 5s
        retries: 5

volumes:
  mysql_data:
