version: '3.8'

services:
  web:
    build: .
    container_name: docklab-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # LOCAL TESTING DATABASE (docklab-mysql)
  # This container acts as a fallback for users who do not have their own DB.
  # If you HAVE your own database URL defined in your .env file, 
  # the 'web' container will connect to your external DB natively and 
  # safely ignore this local container. No config changes required!
  # -------------------------------------------------------------------------
  db:
    image: mysql:8
    container_name: docklab-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-docklabsecret}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-docklab}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 10s
        timeout: 5s
        retries: 5

volumes:
  mysql_data:
